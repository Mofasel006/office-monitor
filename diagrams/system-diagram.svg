<svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, sans-serif">
  <style>
    .box { fill: #161b22; stroke: #58a6ff; stroke-width: 2; rx: 10; }
    .label { fill: #e6edf3; font-size: 15px; font-weight: 600; }
    .sub { fill: #8b949e; font-size: 11px; }
    .arrow { stroke: #58a6ff; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
  </defs>
  <rect width="1000" height="420" fill="#0d1117"/>

  <!-- Simulated Device Layer -->
  <rect class="box" x="30" y="170" width="180" height="90"/>
  <text class="label" x="45" y="205">Simulated Device</text>
  <text class="label" x="45" y="222">Layer</text>
  <text class="sub" x="45" y="240">18 devices, setInterval</text>
  <text class="sub" x="45" y="253">flips state every 5s</text>

  <line class="arrow" x1="210" y1="215" x2="290" y2="215"/>

  <!-- Backend API -->
  <rect class="box" x="290" y="150" width="220" height="130"/>
  <text class="label" x="305" y="185">Backend API</text>
  <text class="sub" x="305" y="205">Express + Socket.io</text>
  <text class="sub" x="305" y="222">deviceStore.js (state)</text>
  <text class="sub" x="305" y="239">alert engine (after-hours,</text>
  <text class="sub" x="305" y="253">continuous-on checks)</text>
  <text class="sub" x="305" y="270">REST + WebSocket, one truth</text>

  <line class="arrow" x1="510" y1="190" x2="600" y2="110"/>
  <line class="arrow" x1="510" y1="240" x2="600" y2="320"/>

  <!-- Web Dashboard -->
  <rect class="box" x="600" y="40" width="200" height="110"/>
  <text class="label" x="615" y="75">Web Dashboard</text>
  <text class="sub" x="615" y="95">React/vanilla + Socket.io-client</text>
  <text class="sub" x="615" y="112">live device panel, power meter,</text>
  <text class="sub" x="615" y="126">alerts, animated floorplan</text>

  <!-- Discord Bot -->
  <rect class="box" x="600" y="270" width="200" height="110"/>
  <text class="label" x="615" y="305">Discord Bot</text>
  <text class="sub" x="615" y="325">discord.js, calls REST API</text>
  <text class="sub" x="615" y="340">!status !room !usage</text>
  <text class="sub" x="615" y="355">LLM humanizes replies</text>

  <line class="arrow" x1="800" y1="95" x2="900" y2="150"/>
  <line class="arrow" x1="800" y1="325" x2="900" y2="200"/>

  <!-- User -->
  <rect class="box" x="900" y="150" width="80" height="90"/>
  <text class="label" x="915" y="200">User</text>
  <text class="sub" x="912" y="217">(boss)</text>

  <!-- proactive alert bonus arrow -->
  <line class="arrow" x1="510" y1="215" x2="600" y2="325" stroke-dasharray="4,3"/>
  <text class="sub" x="500" y="290">bonus: alert push</text>
</svg>
